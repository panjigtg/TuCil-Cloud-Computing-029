services:
  frontend:
    build: ./frontend
    expose:
      - "80"
    networks:
      - app-network
    restart: unless-stopped
  web1:
    build: ./web1
    expose:
      - "5000"
    environment:
      - INSTANCE_NAME=Flask-App
    networks:
      - app-network
    restart: unless-stopped

  web2:
    build: ./web2
    expose:
      - "3000"
    environment:
      - INSTANCE_NAME=Node-App
    networks:
      - app-network
    restart: unless-stopped

  web3:
    build: ./web3
    expose:
      - "80"
    environment:
      - INSTANCE_NAME=PHP-App
    networks:
      - app-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: nginx-lb
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - web1
      - web2
      - web3
    networks:
      - app-network
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: redis-cache
    networks:
      - app-network
    restart: unless-stopped


networks:
  app-network:
    driver: bridge