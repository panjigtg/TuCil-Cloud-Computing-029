services:
  frontend:
    build: ./frontend
    image: hokage_frontend:latest
    expose:
      - "80"
    networks:
      - app-network
    restart: unless-stopped
  web1:
    build: ./web1
    image: hokage_web1:latest
    expose:
      - "5000"
    environment:
      - INSTANCE_NAME=Flask-App
    networks:
      - app-network
    restart: unless-stopped

  web2:
    build: ./web2
    image: hokage_web2:latest
    expose:
      - "3000"
    environment:
      - INSTANCE_NAME=Node-App
    networks:
      - app-network
    restart: unless-stopped

  web3:
    build: ./web3
    image: hokage_web3:latest
    expose:
      - "8080"
    environment:
      - INSTANCE_NAME=Go-App
    networks:
      - app-network
    restart: unless-stopped
  nginx:
    image: nginx:alpine
    container_name: nginx-lb
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - web1
      - web2
      - web3
    networks:
      - app-network
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: redis-cache
    networks:
      - app-network
    restart: unless-stopped


networks:
  app-network:
    driver: overlay